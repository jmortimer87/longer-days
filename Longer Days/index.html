<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Longer Days</title>
  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.7.2/build/global/luxon.min.js"></script>
</head>

<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <main class="wrap">
    <header class="top">
      <div>
        <h1>Days are getting longer</h1>
        <p class="sub">
          Comparing sunset time to the shortest day: <strong>21 Dec 2025</strong>
        </p>
      </div>

      <div class="controls">
        <button id="useGeoBtn" class="btn">Use my location</button>



        <div class="coords">
          <input id="lat" type="number" step="0.0001" placeholder="lat" />
          <input id="lng" type="number" step="0.0001" placeholder="lng" />
          <button id="applyCoords" class="btn btn-ghost">Apply</button>
        </div>
      </div>
    </header>

    <section class="grid">
      <div class="card hero">
        <div class="kicker">Today</div>
        <div class="big" id="headline">Loading…</div>

        <div class="meta" id="metaLine">—</div>
        <div class="meta" id="dailyLine">—</div>

        <div class="mini">
          <div>
            <div class="label">Baseline sunset (21 Dec 2025)</div>
            <div class="value" id="baselineSunset">—</div>
          </div>

          <div>
            <div class="label">Today’s sunset</div>
            <div class="value" id="todaySunset">—</div>
          </div>

          <div>
            <div class="label">Avg. gain/day (since baseline)</div>
            <div class="value" id="avgGain">—</div>
          </div>
        </div>
      </div>

      <div class="card chartCard">
        <div class="cardTop">
          <h2>Minutes later vs 21 Dec 2025</h2>
          <p class="small" id="rangeLine">—</p>
        </div>

        <div class="chartWrap">
          <canvas id="chart" height="120"></canvas>
        </div>
      </div>

      <div class="card footnote">
        <p class="small">
          Data source: Sunrise-Sunset.org API (attribution required).
        </p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
